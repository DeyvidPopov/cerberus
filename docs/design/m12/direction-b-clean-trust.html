<!doctype html>
<!-- M12 mockup — Direction B: "Clean Trust" (light + indigo). Presentation-only; not wired. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus — Direction B · Clean Trust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f1f5f9;
        --surface: #ffffff;
        --field: #f8fafc;
        --border: #e2e8f0;
        --text: #0f172a;
        --muted: #64748b;
        --indigo: #4f46e5;
        --indigo-hi: #6366f1;
        --danger: #dc2626;
        --ring: rgba(79, 70, 229, 0.18);
        --font-ui: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; font-family: var(--font-ui); color: var(--text);
        background: radial-gradient(900px 500px at 50% -5%, #e7eaff 0%, transparent 55%), var(--bg);
        display: grid; place-items: center; padding: 32px;
      }
      .card {
        width: 380px; background: var(--surface); border: 1px solid var(--border);
        border-radius: 16px; padding: 34px 32px 26px;
        box-shadow: 0 20px 48px -24px rgba(15,23,42,.25);
      }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
      .glyph { width: 34px; height: 34px; }
      .wordmark { font-weight: 700; letter-spacing: .12em; font-size: 14px; color: var(--indigo);
        text-transform: uppercase; }
      h2 { font-weight: 700; font-size: 23px; margin: 0 0 4px; letter-spacing: -0.01em; }
      .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 24px; }
      label { display: block; font-size: 12.5px; font-weight: 600; color: #334155; margin: 0 0 6px; }
      .field { margin-bottom: 16px; }
      input {
        width: 100%; height: 44px; padding: 0 14px; font-size: 14px; font-family: var(--font-ui);
        color: var(--text); background: var(--field); border: 1px solid var(--border);
        border-radius: 10px; outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
      }
      input::placeholder { color: #94a3b8; }
      input:focus { border-color: var(--indigo); background: #fff; box-shadow: 0 0 0 4px var(--ring); }
      .btn {
        width: 100%; height: 46px; margin-top: 6px; font-family: var(--font-ui); font-weight: 600;
        font-size: 14.5px; color: #fff; cursor: pointer; border: 0; border-radius: 10px;
        background: linear-gradient(180deg, var(--indigo-hi), var(--indigo));
        box-shadow: 0 10px 22px -10px var(--indigo);
      }
      .btn:hover { filter: brightness(1.04); }
      .link { display: block; width: 100%; margin-top: 16px; text-align: center; background: none;
        border: 0; color: var(--indigo); font-weight: 500; font-size: 13px; cursor: pointer; font-family: var(--font-ui); }
      .link:hover { text-decoration: underline; }
      .foot { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11.5px; }
      .lock { color: #16a34a; }
      .tag { position: fixed; top: 14px; left: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="tag">Direction B — “Clean Trust” · light + indigo</div>
    <main class="card" role="main">
      <div class="brand">
        <svg class="glyph" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <rect x="6" y="13" width="20" height="15" rx="3.5" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
          <path d="M10 13v-3a6 6 0 0 1 12 0v3" stroke="#4f46e5" stroke-width="1.6"/>
          <circle cx="16" cy="20" r="2.2" fill="#4f46e5"/>
        </svg>
        <span class="wordmark">Cerberus</span>
      </div>
      <h2>Unlock your vault</h2>
      <p class="sub">Enter your master password to decrypt your vault on this device.</p>
      <form onsubmit="return false">
        <div class="field">
          <label for="u">Username</label>
          <input id="u" placeholder="you" autocomplete="username" />
        </div>
        <div class="field">
          <label for="p">Master password</label>
          <input id="p" type="password" value="••••••••••••" autocomplete="current-password" />
        </div>
        <button class="btn" type="submit">Log in</button>
      </form>
      <button class="link" type="button">New here? Create a vault</button>
      <div class="foot"><span class="lock">🔒</span> Zero-knowledge — your master password never leaves this device.</div>
    </main>
  </body>
</html>
