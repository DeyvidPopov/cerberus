<!doctype html>
<!-- M12 mockup — Direction A: "Vault" (deep slate + brass). Presentation-only; not wired. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus — Direction A · Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --surface-2: #243248;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --brass: #d4a24e;
        --brass-hi: #e7bd72;
        --danger: #f87171;
        --ring: rgba(212, 162, 78, 0.45);
        --font-ui: 'Inter', system-ui, sans-serif;
        --font-head: 'Sora', 'Inter', sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; font-family: var(--font-ui); color: var(--text);
        background:
          radial-gradient(1200px 600px at 50% -10%, #1b2742 0%, transparent 60%),
          var(--bg);
        display: grid; place-items: center; padding: 32px;
      }
      .card {
        width: 380px; background: linear-gradient(180deg, var(--surface) 0%, #1a2438 100%);
        border: 1px solid var(--border); border-radius: 16px; padding: 32px 30px 26px;
        box-shadow: 0 24px 60px -20px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04);
      }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
      .glyph { width: 34px; height: 34px; }
      .wordmark { font-family: var(--font-head); font-weight: 700; letter-spacing: .14em;
        font-size: 15px; color: var(--brass); text-transform: uppercase; }
      h2 { font-family: var(--font-head); font-weight: 600; font-size: 22px; margin: 0 0 4px; }
      .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 22px; }
      label { display: block; font-size: 12.5px; font-weight: 500; color: var(--muted); margin: 0 0 6px; }
      .field { margin-bottom: 16px; }
      input {
        width: 100%; height: 44px; padding: 0 14px; font-size: 14px; font-family: var(--font-ui);
        color: var(--text); background: var(--surface-2); border: 1px solid var(--border);
        border-radius: 10px; outline: none; transition: border-color .15s, box-shadow .15s;
      }
      input::placeholder { color: #5b6b82; }
      input:focus { border-color: var(--brass); box-shadow: 0 0 0 4px var(--ring); }
      .btn {
        width: 100%; height: 46px; margin-top: 6px; font-family: var(--font-ui); font-weight: 600;
        font-size: 14.5px; color: #1a1206; cursor: pointer; border: 0; border-radius: 10px;
        background: linear-gradient(180deg, var(--brass-hi), var(--brass));
        box-shadow: 0 8px 20px -8px var(--ring);
      }
      .btn:hover { filter: brightness(1.05); }
      .link { display: block; width: 100%; margin-top: 16px; text-align: center; background: none;
        border: 0; color: var(--muted); font-size: 13px; cursor: pointer; font-family: var(--font-ui); }
      .link:hover { color: var(--text); }
      .foot { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11.5px; }
      .dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; }
      .tag { position: fixed; top: 14px; left: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="tag">Direction A — “Vault” · deep slate + brass</div>
    <main class="card" role="main">
      <div class="brand">
        <svg class="glyph" viewBox="0 0 32 32" fill="none" aria-hidden="true">
          <path d="M16 2 3 7v8c0 8 5.6 12.5 13 15 7.4-2.5 13-7 13-15V7L16 2Z" fill="#243248" stroke="#d4a24e" stroke-width="1.5"/>
          <circle cx="16" cy="14" r="3.4" stroke="#d4a24e" stroke-width="1.6"/>
          <path d="M16 17.2v4.2" stroke="#d4a24e" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span class="wordmark">Cerberus</span>
      </div>
      <h2>Unlock your vault</h2>
      <p class="sub">Enter your master password to decrypt your vault on this device.</p>
      <form onsubmit="return false">
        <div class="field">
          <label for="u">Username</label>
          <input id="u" placeholder="you" autocomplete="username" />
        </div>
        <div class="field">
          <label for="p">Master password</label>
          <input id="p" type="password" value="••••••••••••" autocomplete="current-password" />
        </div>
        <button class="btn" type="submit">Log in</button>
      </form>
      <button class="link" type="button">New here? Create a vault</button>
      <div class="foot"><span class="dot"></span> Zero-knowledge — your master password never leaves this device.</div>
    </main>
  </body>
</html>
