name: CI

on:
  push:
    branches: [main]
  pull_request:

# A red pipeline blocks the merge (PROJECT.md §6).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Hermetic crypto/vault core — no Tauri, no system deps, no frontend dist.
  # This is the fast, always-green gate for the security core (ADR-0003 lineage).
  rust-core:
    name: Rust core — fmt, clippy, test (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # PROJECT.md §4.1 — rustfmt enforced.
      - name: rustfmt --check
        run: cargo fmt --all --check

      # PROJECT.md §4.1, §6 — clippy with warnings denied (default features only,
      # so the Tauri-gated `commands`/bin are not compiled here).
      - name: clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # PROJECT.md §6 — the full crypto/vault/persistence test suite.
      - name: cargo test
        run: cargo test --workspace

  # Tauri desktop build — needs the webview system libraries AND the built
  # frontend dist (embedded by `generate_context!`), so dist is built BEFORE cargo.
  desktop:
    name: Desktop — Tauri build (--features desktop)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # generate_context! embeds the frontend, so the dist must exist first.
      - name: Build frontend dist
        run: npm run build --workspace @cerberus/desktop

      - name: Build Tauri app
        run: cargo build -p cerberus-desktop --features desktop

      - name: clippy (desktop feature)
        run: cargo clippy -p cerberus-desktop --features desktop --all-targets -- -D warnings

  typescript:
    name: TypeScript — tsc, eslint, vitest (+ ephemeral Postgres)
    runs-on: ubuntu-latest
    # PROJECT.md §6 — repository/integration tests run against a REAL Postgres.
    # The test harness creates an ephemeral database per run on this service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      # The headline E2E (sync.e2e.test.ts) drives the real Rust crypto via this
      # hermetic CLI oracle built below.
      CERBERUS_CLI_BIN: target/debug/cerberus-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The E2E test needs the hermetic crypto CLI (no Tauri / no system deps).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Build crypto CLI (for the E2E)
        run: cargo build --bin cerberus-cli

      # PROJECT.md §6 — tsc --noEmit across all TS packages.
      - name: Typecheck
        run: npm run typecheck

      # PROJECT.md §4.2, §6 — eslint (any banned, no default exports, no floating promises).
      - name: Lint
        run: npm run lint

      # PROJECT.md §6 — TS unit + integration tests + the headline E2E
      # (repositories hit real Postgres; the E2E also drives the Rust crypto CLI).
      - name: Test
        run: npm test
